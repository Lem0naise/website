<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="google-site-verification" content="Mjwi8fp-GIfDM41jXFYDAS7nCmwb3fSguVAirwzQ6Yk" />

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="UTF-8">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https://indigo-worker.soft-resonance-63c0.workers.dev https://api.github.com https://api.open-meteo.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">
        <link rel="preconnect" href="https://api.github.com">
        <link rel="preconnect" href="https://api.open-meteo.com">
        <link rel="preload" href="{{ '/fonts/syne-mono-v15-latin-regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
        <title>{{ page.title }} - Indigo Nolan</title>
        
        <link rel="stylesheet" href="{{ '/stylesheet.css' | relative_url }}?version=0.10">
        <link rel="stylesheet" href="{{ '/blog/blog.css' | relative_url }}?version=0.10">
        <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
        
        <meta name="description" content="{{ page.description | default: 'Personal portfolio and blog by Indigo Nolan, covering web apps, games, tools, and writing.' }}"/>
        <meta name="keywords" content="{{ page.keywords | default: 'Indigo Nolan, portfolio, blog, web development, React, Next.js, games, tools, writing' }}"/>
        <meta name="author" content="{{ page.author | default: 'Indigo Nolan' }}"/>
        
        <script src="{{ '/js/dark-init.js' | relative_url }}"></script>
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://indigo.spot/blog">
		<meta property="og:title" content="Blog - Indigo Nolan">
		<meta property="og:description" content="A blog full of design thoughts, democracy opinions, and short stories.">
		
		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image">
		<meta property="twitter:title" content="Blog - Indigo Nolan">
		<meta property="twitter:description" content="Blog of web applications, games, and development tools">
		

        <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ "/feed.xml" | relative_url }}">
        
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "Indigo Nolan",
            "url": "https://indigo.spot",
            "author": {
                "@type": "Person",
                "name": "Indigo Nolan"
            }
        }
        </script>
    </head>
    
    <body class="has-sidebar">
        <header id="header">
            <div class="header-content">
                <a class="logo" href='{{ "/" | relative_url }}'>Indigo Nolan</a>
                <nav id="menu">
                    <a href="{{ "/" | relative_url }}" class="tab">Home</a>
                    <a href="{{ "/portfolio/" | relative_url }}" class="tab">Projects</a>
                    <a href="{{ "/blog/" | relative_url }}" class="tab {% if page.url == '/blog/' or page.url == '/thoughts/' %}active{% endif %}">Blog</a>
                    <span onclick="toggle()" class="tab tab-svg">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
						<path id='toggle-button'
							d="M12 2A9.91 9.91 0 0 0 9 2.46A10 10 0 0 1 9 21.54A10 10 0 1 0 12 2Z" />
					</svg>
                    </span>
                </nav>
            </div>
        </header>

        <nav class="nav-sidebar" id="nav-sidebar">
            <a href="/" class="sidebar-card" data-path="/">
                <svg aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-home"/></svg>
                <span>Home</span>
            </a>
            <a href="/portfolio" class="sidebar-card" data-path="/portfolio">
                <svg aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-monitor"/></svg>
                <span>Projects</span>
            </a>
            <a href="/blog" class="sidebar-card" data-path="/blog">
                <svg aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-notebook"/></svg>
                <span>Blog</span>
            </a>
            <a href="/#about" class="sidebar-card">
                <svg aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-person"/></svg>
                <span>About Me</span>
            </a>
            <a href="/cv" class="sidebar-card" data-path="/cv">
                <svg aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-phone"/></svg>
                <span>CV &amp; Contact</span>
            </a>
            <a href="/photos" class="sidebar-card" data-path="/photos">
                <svg aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-camera"/></svg>
                <span>Photos</span>
            </a>
            <a href="https://github.com/Lem0naise" target="_blank" rel="noopener" class="sidebar-card">
                <svg aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-github"/></svg>
                <span>GitHub</span>
            </a>
        </nav>

        <main style="padding-top: 70px;">
            {{ content }}
        </main>

        <div class="section-separator" style="margin-top: 20px; margin-bottom: 20px;"></div>
			<section id="contact-info" class="contact-info-section">
				<div class="contact-content">
					<h2>Let's get in touch!</h2>
					<div class="contact-methods">
						<a href="../portfolio/IndigoNolan-Resume.pdf" target="_blank" class="contact-method" rel="noopener noreferrer">
							<svg class='project-icon' aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-download"/></svg>
							<span>CV / Resume</span>
						</a>
						<a href="https://github.com/Lem0naise" target="_blank" class="contact-method" rel="noopener noreferrer">
							<svg class='project-icon' aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-github"/></svg>
							<span>GitHub</span>
						</a>
						<a href="https://linkedin.com/in/indigonolan" target="_blank" class="contact-method" rel="noopener noreferrer">
							<svg class='project-icon' aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-linkedin"/></svg>
							<span>LinkedIn</span>
						</a>
						<a id="copy-email" class="contact-method" data-email="blog@indigonolan.com">
							<svg class='project-icon' aria-hidden="true" focusable="false"><use href="/assets/icons.svg#icon-email"/></svg>
							<span>Email</span>
                        </a>
					</div>
				</div>
			</section>
        
        <script src="{{ '../js/dark.js' | relative_url }}" defer></script>
        <script src="{{'../js/themes.js' | relative_url}}" defer></script>
        <script src="/js/nav-transition.js" defer></script>
        <script src="/js/copy-email.js" defer></script>
    </body>
</html>
