    <!-- NEW: Import the parser and run it -->
    <script src="/js/cv-parser.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const target = document.getElementById('cv-rendered-content');
            try {
                // IMPORTANT: Ensure this path points to where your .tex file actually lives
                const response = await fetch('../portfolio/IndigoNolan-CV-Full.tex');
                if (!response.ok) throw new Error("Could not fetch the .tex file.");
                const rawTex = await response.text();
                
                const parser = new CVParser();
                target.innerHTML = parser.parse(rawTex);
            } catch (error) {
                console.error("Error generating CV:", error);
                target.innerHTML = "<p style='color:red;text-align:center;'>Unable to load live CV. Please use the download button above.</p>";
            }
        });
    </script>
