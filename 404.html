<body>

            <nav id="menu">

    <main style="padding-top: 70px;">
        <div class="welcome-section"
            style="min-height: calc(100vh - 70px); align-items: flex-start; padding-top: 20px;">
            <div class="welcome-content" style="width: 100%; max-width: 900px;">

                <p style="font-size: 18px; color: var(--text-light); margin: 0 0 32px;">
                    Looks like you're lost. While you're here, why not play a game?
                </p>
                <div class="game-container">
                    <canvas id="gameCanvas" width="800" height="300"></canvas>
                    <p class="instructions">
                        <b>Press SPACE or touch the screen to jump.</b><br>
                        Dodge the cacti and hit the pong ball back! If you hit a cactus or miss the ball, game over.

                    <button class='btns404 view-all-btn'  id="restartBtn" onclick="initGame()">Play Again</button>

     <script>
        (function () {
            var redirects = {
                '/git':      'https://github.com/lem0naise',
                '/github':   'https://github.com/lem0naise',
                '/csl':      'https://climatestorieslibrary.com',
                '/link':     'https://www.linkedin.com/in/indigonolan',

                '/cashcat':    'https://cashcat.app', // Or the actual external URL

                window.location.replace(redirects[path] + window.location.search);
            }

    <script>

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restartBtn');

        let isGameOver = false;
        let score = 0;
        let finalScore = 0;
        let frames = 0;

        let dino = {
            x: 50,
            y: 200,
            width: 30,
            height: 40,
            dy: 0,
            gravity: 0.6,
            jumpPower: -10,
            grounded: true
        };

        let pong = {
            x: 400,
            y: 100,
            radius: 8,
            dx: -5,
            dy: 3
        };

        let ai = {
            x: 770,
            y: 100,
            width: 15,
            height: 60,
            speed: 4
        };

        let obstacles = [];
        let speedMultiplier = 1;
        const OBSTACLE_BALL_COLLISION_COOLDOWN_MS = 100;
        let lastObstacleBallCollisionTime = 0;

        // Colors
        let style = getComputedStyle(document.body);
        let colorDino = style.getPropertyValue('--accent').trim() || '#8b5a83';
        let colorEnemy = style.getPropertyValue('--text-light').trim() || '#666';
        let colorBall = style.getPropertyValue('--text').trim() || '#2d2d2d';

        function initGame() {
            isGameOver = false;
            score = 0;
            finalScore = 0;
            frames = 0;
            speedMultiplier = 1;
            lastObstacleBallCollisionTime = 0;

            dino.y = 200;
            dino.dy = 0;

            pong.x = 400;
            pong.y = 100;
            pong.dx = -5;
            pong.dy = 3;

            obstacles = [];
            restartBtn.style.display = 'none';

            // Refresh colors in case of theme toggle
            style = getComputedStyle(document.body);
            colorDino = style.getPropertyValue('--accent').trim() || '#8b5a83';
            colorEnemy = style.getPropertyValue('--text-light').trim() || '#666';
            colorBall = style.getPropertyValue('--text').trim() || '#2d2d2d';

            requestAnimationFrame(update);
        }

        function jump(){
            dino.dy = dino.jumpPower;
            dino.grounded = false;
        }
        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'ArrowUp')) {
                if ( !isGameOver){
                    e.preventDefault();           
                jump();
                }
                else {
                    initGame()
                }
              
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            if (!isGameOver) {
                e.preventDefault();
                jump();
            }
        });

        function spawnObstacle() {
            let width = 25;
            let height = 35;

            let obst = {
                x: canvas.width,
                y: 240-height,
                width: width,
                height: height
            }
            if (Math.random() < 0.5) {
                obst.y = height+20;
            }
            obstacles.push(obst);
        }

        
        function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
            return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
        }

        function circleRectIntersect(cx, cy, r, rx, ry, rw, rh) {
            let testX = cx;
            let testY = cy;

            if (cx < rx) testX = rx;
            else if (cx > rx + rw) testX = rx + rw;
            if (cy < ry) testY = ry;
            else if (cy > ry + rh) testY = ry + rh;

            let distX = cx - testX;
            let distY = cy - testY;
            return (distX * distX + distY * distY) <= (r * r);
        }

        function update() {
            if (isGameOver) return;
            const now = performance.now();
            frames++;

            if (frames % 600 === 0) speedMultiplier += 0.1;

            // Dino Physics
            dino.y += dino.dy;
            // Cap at top
            if (dino.y < 0) {
                dino.y = 0;
                dino.dy = 0;
            }
            // Ground collision
            if (dino.y + dino.height < 240) {
                dino.dy += dino.gravity;
                dino.grounded = false;
            } else {
                dino.dy = 0;
                dino.y = 240 - dino.height;
                dino.grounded = true;
            }

            // Obstacles
            if (frames % Math.max(40, Math.floor(100 / speedMultiplier)) === 0) {
                if (Math.random() > 0.3) {
                    spawnObstacle();
                }
            }

            // Update obstacles and check collisions (reverse loop for safe removal)
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= 6 * speedMultiplier;

                // Remove if completely offscreen
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    continue;
                }

                if (rectIntersect(dino.x, dino.y, dino.width, dino.height, obs.x, obs.y, obs.width, obs.height)) {
                    gameOver();
                    return;
                }

                if (circleRectIntersect(pong.x, pong.y, pong.radius, obs.x, obs.y, obs.width, obs.height)) {
                    if (now - lastObstacleBallCollisionTime >= OBSTACLE_BALL_COLLISION_COOLDOWN_MS) {
                        pong.dx *= -1;
                        pong.dy *= -1;
                        lastObstacleBallCollisionTime = now;
                    }
                }
            }

            // Pong Physics
            pong.x += pong.dx * speedMultiplier;
            pong.y += pong.dy * speedMultiplier;

            // Bounce top/bottom/ground with proper positioning
            if (pong.y - pong.radius < 0) { 
                pong.y = pong.radius; 
                pong.dy = Math.abs(pong.dy); // Ensure moving downward
            }
            if (pong.y + pong.radius > 240) { 
                pong.y = 240 - pong.radius; 
                pong.dy = -Math.abs(pong.dy); // Ensure moving upward
            }
            // Bounce off right wall
            if (pong.x + pong.radius > canvas.width) {
                pong.x = canvas.width - pong.radius;
                pong.dx = -Math.abs(pong.dx); // Ensure moving left
            }

            // AI paddle tracking (only move if ball is heading toward AI)
            if (pong.dx > 0) {
                const targetY = ai.y + (ai.y + ai.height / 2 < pong.y ? ai.speed : -ai.speed);
                ai.y = targetY < 0 ? 0 : (targetY + ai.height > 240 ? 240 - ai.height : targetY);
            }

            // Pong collision with AI
            if (circleRectIntersect(pong.x, pong.y, pong.radius, ai.x, ai.y, ai.width, ai.height)) {
                pong.x = ai.x - pong.radius;
                pong.dx = -Math.abs(pong.dx);
                pong.dy += (Math.random() - 0.5) * 2;
                if (pong.dy > 5) pong.dy = 5;
                else if (pong.dy < -5) pong.dy = -5;
            }

            // Pong collision with Dino -> Dino acts as paddle
            if (circleRectIntersect(pong.x, pong.y, pong.radius, dino.x, dino.y, dino.width, dino.height)) {
                pong.x = dino.x + dino.width + pong.radius;
                pong.dx = Math.abs(pong.dx);
                pong.dy += (Math.random() - 0.5) * 2;
                if (pong.dy > 5) pong.dy = 5;
                else if (pong.dy < -5) pong.dy = -5;
                score += 10;
            }

            // Lose condition: ball passes Dino
            if (pong.x < -pong.radius) {
                gameOver();
            }

            score += 0.05 * speedMultiplier; // survival points

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground line
            ctx.fillStyle = colorEnemy;
            ctx.fillRect(0, 240, canvas.width, 2);

            // Draw Dino
            ctx.fillStyle = colorDino;
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
            // Dino eye
            ctx.fillStyle = '#fff';
            ctx.fillRect(dino.x + 20, dino.y + 5, 4, 4);

            // Draw Obstacles
            ctx.fillStyle = colorEnemy;
            for (let obs of obstacles) {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }

            // Draw AI Paddle
            ctx.fillStyle = colorDino;
            ctx.fillRect(ai.x, ai.y, ai.width, ai.height);

            // Draw Pong Ball
            ctx.beginPath();
            ctx.arc(pong.x, pong.y, pong.radius, 0, Math.PI * 2);
            ctx.fillStyle = colorBall;
            ctx.fill();
            ctx.closePath();

            // Draw Score
            ctx.fillStyle = colorBall;
            ctx.font = '20px "Syne Mono", monospace';
            ctx.textAlign = 'right';
            ctx.fillText('Score: ' + Math.floor(score), canvas.width - 20, 30);

            // Draw game over overlay from render loop so it's always visible
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.font = '40px "Syne Mono", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);

                ctx.font = '20px "Syne Mono", monospace';
                ctx.fillText('Final Score: ' + finalScore, canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function gameOver() {
            if (isGameOver) return;
            isGameOver = true;
            finalScore = Math.floor(score);
            draw();

            restartBtn.style.display = 'block';
        }

        // Wait for fonts to load before first draw
        document.fonts.ready.then(() => {
            initGame();
        });
    </script>
    <script src="/js/dark.js"></script>
</body>
